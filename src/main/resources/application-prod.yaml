spring:
  application:
    name: url-shortener

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    open-in-view: false

    hibernate:
      ddl-auto: validate

    show-sql: false

    properties:
      hibernate:
        format_sql: false

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 900000
  refresh-token-expiration: 604800000

logging:
  level:
    root: INFO
    com.karthik.urlshortener: INFO

management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info

  endpoint:
    health:
      show-details: never

info:
  app:
    name: url-shortener
    description: URL Shortener backend
    version: 1.0.0

admin:
  email: ${ADMIN_EMAIL}
  password: ${ADMIN_PASSWORD}

app:
  base-short-url: https://knurls.me/r/

google:
  client-id: ${GOOGLE_CLIENT_ID}